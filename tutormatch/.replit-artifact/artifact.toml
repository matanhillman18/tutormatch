kind = "web"
previewPath = "/"
title = "TutorMatch"
version = "1.0.0"
id = "artifacts/tutormatch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23766

[services.development]
run = "pnpm --filter @workspace/tutormatch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tutormatch", "run", "build" ]
publicDir = "artifacts/tutormatch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23766"
BASE_PATH = "/"
